<?xml version="1.0" encoding="UTF-8"?>
<!--
  Imverica splash screen — 2732×2732 source.
  Centered logo + tagline on navy background.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e4a"/>
      <stop offset="100%" stop-color="#2b4264"/>
    </linearGradient>
  </defs>
  <rect width="2732" height="2732" fill="url(#bg)"/>

  <!-- Wordmark "Imverica" -->
  <text x="1366" y="1340"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="180"
        font-weight="700"
        fill="#f5f0e6"
        text-anchor="middle"
        letter-spacing="2">Imverica</text>

  <!-- Tagline -->
  <text x="1366" y="1450"
        font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="48"
        font-weight="400"
        fill="#f5f0e6"
        fill-opacity="0.7"
        text-anchor="middle"
        letter-spacing="5">LEGAL SOLUTIONS</text>

  <!-- Terracotta divider -->
  <rect x="1276" y="1500" width="180" height="6" rx="3" fill="#c2603e"/>
</svg>
