<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Imverica</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #1a2e4a 0%, #2b4264 100%);
      color: #fff;
      text-align: center;
    }
    .logo {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .tag {
      font-size: 13px;
      opacity: 0.75;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint {
      margin-top: 24px;
      font-size: 13px;
      opacity: 0.7;
    }
    .retry-block {
      display: none;
      margin-top: 28px;
    }
    .retry-block.show { display: block; }
    button {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <div class="logo">Imverica</div>
  <div class="tag">Legal Solutions · California</div>
  <div class="spinner"></div>
  <div class="hint">Loading…</div>

  <div class="retry-block" id="retry">
    <p style="font-size: 14px; opacity: 0.85; max-width: 320px;">
      We couldn't reach the server. Check your connection and try again.
    </p>
    <button onclick="location.reload()">Retry</button>
  </div>

  <script>
    // If the WebView is configured with server.url=https://imverica.com,
    // Capacitor never actually loads this page in normal operation — it
    // points directly at the remote URL. This index is the offline-fallback
    // shown when the WebView fails to reach the network (and during very
    // early init on cold launch).
    //
    // Auto-redirect to live site as soon as DOM is ready; if offline, show
    // a retry button after 6 seconds.
    setTimeout(function () {
      document.getElementById('retry').classList.add('show');
    }, 6000);

    // If we DO end up here while online (e.g. someone tapped a stale cache),
    // bounce to live.
    if (navigator.onLine) {
      window.location.replace('https://imverica.com/account');
    }
    window.addEventListener('online', function () {
      window.location.replace('https://imverica.com/account');
    });
  </script>
</body>
</html>
