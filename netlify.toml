[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/pdf-maps/**"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/route"
  to = "/.netlify/functions/route"
  status = 200

[[redirects]]
  from = "/api/ca-form"
  to = "/.netlify/functions/ca-form"
  status = 200

[[redirects]]
  from = "/api/uscis-form"
  to = "/.netlify/functions/uscis-form"
  status = 200

[[redirects]]
  from = "/api/immigration-flow"
  to = "/.netlify/functions/immigration-flow"
  status = 200

[[redirects]]
  from = "/api/uscis-pdf-map"
  to = "/.netlify/functions/uscis-pdf-map"
  status = 200

[[redirects]]
  from = "/api/intake"
  to = "/.netlify/functions/intake"
  status = 200

[[redirects]]
  from = "/api/address-suggest"
  to = "/.netlify/functions/address-suggest"
  status = 200

[[redirects]]
  from = "/api/address-verify"
  to = "/.netlify/functions/address-verify"
  status = 200
